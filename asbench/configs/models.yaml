description: "Configurations for AgentSearchBench models."

nli_model: MoritzLaurer/mDeBERTa-v3-base-mnli-xnli
hf_token_env: HF_TOKEN
hf_api_env: HF_API_KEY

retrieval_models:    # sentence transformer models
  bm25:
    model: null
    index: naive     # options: description | agentbase
  bge:
    model: BAAI/bge-large-en-v1.5
    index: naive
  toolret:
    model: mangopy/ToolRet-trained-bge-large-en-v1.5
    index: naive

llm_models:           # litellm models
  gpt-5.2:
    model: openai/gpt-5.2
    api_key_env: OPENAI_API_KEY
    temperature: 1.0

  gemini-2.5-pro:
    model: gemini/gemini-2.5-pro
    api_key_env: GEMINI_API_KEY
    temperature: 1.0

  qwen-3.5-397B_openrouter:
    model: openrouter/qwen/qwen3.5-397b-a17b
    api_key_env: OPENROUTER_API_KEY
    temperature: 1.0

executor_platforms:
  agentainetwork:
    credential: AGENT_AI_NETWORK_KEY
  openaiagents:
    credential: session.json